<!doctype html>
<html lang="zh-Hans">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>工程进度</title>
	<link rel="stylesheet" href="/iframe/css/bootstrap.min.css" />
	<link rel="stylesheet" href="/iframe/css/style.css" />
</head>

<body>
	<!-- 顶部进度区域 -->
	<div class="progress-header" id="progressHeader">
		<div class="progress-circle">
			<svg width="50" height="50" viewBox="0 0 80 80">
				<circle class="bg" cx="40" cy="40" r="32"></circle>
				<circle class="progress" cx="40" cy="40" r="32" stroke-dasharray="201" stroke-dashoffset="201"
					id="progressCircle"></circle>
			</svg>
			<div class="progress-percent" id="progressPercent">0%</div>
		</div>
		<div class="progress-info">
			<div class="progress-stats">
				<span class="stat-item" id="pinStats">0/0 引脚</span>
				<span class="stat-divider">|</span>
				<span class="stat-item" id="compStats">0/0 元件</span>
			</div>
			<div class="motivation-text" id="motivation">📋 等待加载...</div>
		</div>
	</div>

	<!-- 工具栏 -->
	<div class="toolbar">
		<input type="text" class="search-input" id="searchInput" placeholder="搜索..." />
		<button class="refresh-btn" id="refreshBtn" title="刷新全部">🔄</button>
		<button class="refresh-btn auto-btn" id="autoRefreshBtn" title="自动刷新">▶️</button>
	</div>

	<!-- 任务列表 -->
	<div class="task-list" id="taskListContainer">
		<div class="empty-state">
			<div class="empty-icon">⏳</div>
			<div>正在加载...</div>
		</div>
	</div>

	<!-- 调试面板 -->
	<div class="debug-panel">
		<div class="debug-header" id="debugHeader">
			<span id="debugToggleIcon">▶</span>
			<span>调试</span>
		</div>
		<div class="debug-content" id="debugContent" style="display: none;"></div>
	</div>

	<script src="/iframe/js/bootstrap.bundle.min.js"></script>
	<script src="/dist/iframe/app.js"></script>
</body>

</html>
